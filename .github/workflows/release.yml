name: Package & Release Extension

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0)'
        required: false

jobs:
  package:
    name: Build & Upload Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' shadowing-extension/manifest.json)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Extension version: v${VERSION}"

      - name: Package extension
        run: |
          cd shadowing-extension
          zip -r ../shadowecho-extension.zip . \
            --exclude "*.git*" \
            --exclude "build-release.*" \
            --exclude "server/*" \
            --exclude "*.md"
          echo "Package size: $(du -sh ../shadowecho-extension.zip | cut -f1)"

      - name: Upload artifact (every push to main)
        uses: actions/upload-artifact@v4
        with:
          name: shadowecho-extension-${{ github.sha }}
          path: shadowecho-extension.zip
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: shadowecho-extension.zip
          generate_release_notes: true
          name: "ShadowEcho ${{ github.ref_name }}"
          body: |
            ## ShadowEcho Chrome Extension ${{ github.ref_name }}

            ### Installation
            1. Download `shadowecho-extension.zip`
            2. Extract the zip file
            3. Open Chrome → Extensions (`chrome://extensions`)
            4. Enable **Developer mode**
            5. Click **Load unpacked** → select the extracted folder
            6. Open a YouTube video and click the ShadowEcho icon

            ### What's new
            See commit history for detailed changes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Separate job: lint & validate manifest
  validate:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest
        run: |
          jq empty shadowing-extension/manifest.json && echo "manifest.json is valid JSON"
          VERSION=$(jq -r '.version' shadowing-extension/manifest.json)
          echo "Manifest version: $VERSION"
          MANIFEST_V=$(jq -r '.manifest_version' shadowing-extension/manifest.json)
          [ "$MANIFEST_V" = "3" ] && echo "Manifest v3 ✓" || (echo "Expected manifest_version 3" && exit 1)
